# ============================================================
# application-prod.properties  –  Production profile (MySQL)
# ============================================================

# Datasource – MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:student_management}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SmsHikariPool

# JPA – let Flyway manage schema
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false

# H2 console disabled
spring.h2.console.enabled=false

# data.sql disabled – Flyway handles all migrations
spring.sql.init.mode=never

# Flyway ENABLED
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRY_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

# Mail
app.mail.enabled=${MAIL_ENABLED:false}

# Actuator – restricted in prod
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never

# Logging
logging.level.com.sms=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
