# ============================================================
# application.properties  –  base / dev profile (H2 in-memory)
# ============================================================
spring.application.name=Student Management System
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=NON_NULL

# ============================================================
# H2 In-Memory Database  (dev profile)
# ============================================================
spring.datasource.url=jdbc:h2:mem:smsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=jeetGajbhiye
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate  (H2 dev – ddl-auto creates tables)
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ============================================================
# Seed data via data.sql  (H2 dev only)
# ============================================================
spring.sql.init.mode=always
spring.sql.init.platform=h2

# ============================================================
# Flyway  (DISABLED for H2 dev – ENABLED only in prod profile)
# ============================================================
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# ============================================================
# Cache  (Caffeine)
# ============================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# ============================================================
# JWT
# ============================================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ============================================================
# Mail  (disabled by default)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@sms.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=false
app.mail.from=noreply@sms.com

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
info.app.name=Student Management System
info.app.version=1.0.0
info.app.description=Professional SMS built with Spring Boot 3 and Java 21

# ============================================================
# Logging
# ============================================================
logging.level.com.sms=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n
logging.file.name=logs/sms-application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ============================================================
# i18n
# ============================================================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
